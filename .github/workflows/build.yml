name: Build APK (Flet Android 15)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 1. Código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 2. Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 📦 3. Instalar Flet
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet

      # 🔐 4. Decodificar keystore (si ya lo tienes en secrets)
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      # 🏗️ 5. Build APK RELEASE
      - name: Build APK
        run: |
          flet build apk --release \
            --android-keystore keystore.jks \
            --android-keystore-password "${{ secrets.KEYSTORE_PASSWORD }}" \
            --android-key-alias "${{ secrets.KEY_ALIAS }}" \
            --android-key-password "${{ secrets.KEY_PASSWORD }}"

      # 📤 6. Subir APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: build/app/outputs/flutter-apk/*.apk
