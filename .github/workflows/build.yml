name: Build APK (Stable Auto Detect)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      FLET_FORCE_AUTO_INSTALL: "true"

    steps:
      # 📥 1. Código
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🐍 2. Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 📦 3. Instalar Flet
      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet

      # 🏗️ 4. Build APK
      - name: Build APK
        run: yes | flet build apk

      # 🔍 5. Buscar APK automáticamente
      - name: Find APK file
        run: |
          echo "Buscando APK generado..."
          find . -name "*.apk" > apk_list.txt
          cat apk_list.txt

      # 📦 6. Subir APK encontrado
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bola-caliente-apk
          path: |
            **/*.apk
