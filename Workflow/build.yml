name: Build Signed APK (Flet Android 15)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Obtener código
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Instalar Flet
      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet

      # 4. Crear keystore desde secrets
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      # 5. Build APK firmado (IMPORTANTE)
      - name: Build APK Release Signed
        run: |
          flet build apk --release \
            --android-keystore keystore.jks \
            --android-keystore-password "${{ secrets.KEYSTORE_PASSWORD }}" \
            --android-key-alias "${{ secrets.KEY_ALIAS }}" \
            --android-key-password "${{ secrets.KEY_PASSWORD }}"

      # 6. Subir APK final
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bola-caliente-apk
          path: build/app/outputs/flutter-apk/*.apk
